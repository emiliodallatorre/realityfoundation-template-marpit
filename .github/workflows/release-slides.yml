name: Build and Release Slides

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF (Docker)
        run: |
          rm -f TEMPLATE.pdf
          docker run --rm --init \
            --user 0:0 \
            -v "$PWD:/home/marp/app/" \
            -e "LANG=C.UTF-8" \
            marpteam/marp-cli \
            TEMPLATE.md \
            --pdf \
            --output /home/marp/app/TEMPLATE.pdf \
            --theme-set ./realityfoundation-bright.css \
            --allow-local-files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Slides (main latest)
          body: Automated build from main.
          files: TEMPLATE.pdf
          overwrite_files: true
