name: Build and Release Slides

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build PDF
        run: |
          rm -f TEMPLATE.pdf
          marp TEMPLATE.md --pdf --output TEMPLATE.pdf --theme-set ./realityfoundation-bright.css --allow-local-files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Slides (main latest)
          body: Automated build from main.
          files: TEMPLATE.pdf
          overwrite_files: true
